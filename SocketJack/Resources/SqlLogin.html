<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Admin - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh
        }

        .login-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5)
        }

            .login-box h1 {
                color: #569cd6;
                font-size: 20px;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 8px
            }

                .login-box h1 svg {
                    width: 24px;
                    height: 24px;
                    fill: #569cd6
                }

            .login-box p.sub {
                color: #808080;
                font-size: 12px;
                margin-bottom: 24px
            }

        .form-group {
            margin-bottom: 16px
        }

            .form-group label {
                display: block;
                font-size: 12px;
                color: #9cdcfe;
                margin-bottom: 4px
            }

            .form-group input {
                width: 100%;
                padding: 8px 12px;
                background: #1e1e1e;
                border: 1px solid #3c3c3c;
                border-radius: 4px;
                color: #d4d4d4;
                font-size: 14px;
                outline: none
            }

                .form-group input:focus {
                    border-color: #569cd6
                }

        .error {
            color: #f44747;
            font-size: 12px;
            margin-bottom: 12px;
            display: none
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #0e639c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s
        }

            .btn:hover {
                background: #1177bb
            }

            .btn:disabled {
                opacity: .5;
                cursor: not-allowed
            }
    </style>
</head>
<body>
    <div class="login-box">
        <h1><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 3.79 2 6v12c0 2.21 4.48 4 10 4s10-1.79 10-4V6c0-2.21-4.48-4-10-4zm0 2c4.42 0 8 1.34 8 3s-3.58 3-8 3-8-1.34-8-3 3.58-3 8-3zM4 18V9.87C5.73 11.14 8.59 12 12 12s6.27-.86 8-2.13V18c0 1.66-3.58 3-8 3s-8-1.34-8-3z" /></svg> SQL Admin Panel</h1>
        <p class="sub">Connect to the SocketJack DataServer</p>
        <div class="error" id="error"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" autocomplete="username" placeholder="sa">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Password">
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">Connect</button>
    </div>
    <script>
        function doLogin() {
            var btn = document.getElementById('loginBtn');
            var err = document.getElementById('error');
            btn.disabled = true; err.style.display = 'none';
            var u = document.getElementById('username').value;
            var p = document.getElementById('password').value;
            fetch('$BasePath/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) })
                .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d } }) })
                .then(function (r) {
                    if (r.ok) { window.location.reload() }
                    else { err.textContent = r.data.error || 'Login failed'; err.style.display = 'block' }
                    btn.disabled = false;
                }).catch(function (e) { err.textContent = 'Connection error'; err.style.display = 'block'; btn.disabled = false });
        }
        document.getElementById('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin() });
        document.getElementById('username').addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('password').focus() });
        document.getElementById('username').focus();
    </script>
</body>
</html>
