<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SocketJack HttpServer</title>
<style>
:root {
    color-scheme: dark;
    --bg: #05070b;
    --panel: rgba(10, 17, 28, 0.72);
    --line: rgba(255, 255, 255, 0.16);
    --text: #f7fbff;
    --muted: rgba(247, 251, 255, 0.68);
    --accent: #54e1c0;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; }
body {
    display: grid;
    place-items: center;
    padding: 24px;
    background:
        radial-gradient(circle at 20% 16%, rgba(84, 225, 192, 0.16), transparent 28rem),
        radial-gradient(circle at 80% 84%, rgba(112, 167, 255, 0.14), transparent 30rem),
        var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
}
main {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: clamp(22px, 5vw, 42px);
    background: var(--panel);
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
}
.eyebrow {
    margin: 0 0 12px;
    color: var(--accent);
    font: 700 0.78rem "Cascadia Mono", Consolas, monospace;
    text-transform: uppercase;
}
h1 {
    margin: 0;
    font-size: clamp(2.2rem, 7vw, 4.4rem);
    line-height: 0.98;
    font-weight: 700;
}
p {
    margin: 18px 0 0;
    color: var(--muted);
    font-size: 1.04rem;
    line-height: 1.58;
}
code {
    color: #d9fff5;
    font-family: "Cascadia Mono", Consolas, monospace;
}
</style>
</head>
<body>
<main>
    <p class="eyebrow">SocketJack.Net</p>
    <h1>SocketJack HttpServer</h1>
    <p>This is the default page for a SocketJack <code>HttpServer</code>. Replace <code>IndexPageHtml</code> or map <code>GET /</code> to serve an application-specific landing page.</p>
</main>
</body>
</html>
