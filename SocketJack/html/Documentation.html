<script>
const docsData=JSON.parse(document.getElementById('docs-data').textContent);
const repoData=JSON.parse(document.getElementById('repo-data').textContent);
const state={active:null,query:'',members:[],loadingMembers:false};
const byId=new Map();
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function flatten(){const rows=[];docsData.products.forEach(p=>p.categories.forEach(c=>c.items.forEach(i=>{i.product=p.title;i.productId=p.id;i.category=c.title;i.symbol=p.symbol;byId.set(i.id,i);rows.push(i)})));return rows}
const items=flatten();
function renderTree(){const q=state.query.toLowerCase();const tree=document.getElementById('tree');tree.textContent='';docsData.products.forEach(product=>{const prod=document.createElement('section');prod.className='product';prod.innerHTML='<div class="product-title"><span>'+esc(product.symbol+' '+product.title)+'</span><span>›</span></div>';product.categories.forEach(cat=>{const visible=cat.items.filter(item=>!q||(item.title+' '+item.summary+' '+cat.title+' '+product.title).toLowerCase().includes(q));if(!visible.length)return;const box=document.createElement('div');box.className='cat';box.innerHTML='<div class="cat-title">'+esc(cat.title)+'</div>';visible.forEach(item=>{const btn=document.createElement('button');btn.type='button';btn.className='item'+(state.active&&state.active.id===item.id?' active':'');btn.textContent='↳ '+item.title;btn.onclick=()=>openItem(item.id);box.appendChild(btn)});prod.appendChild(box)});tree.appendChild(prod)})}
function requirementRows(item){return (item.requirements||[]).map(r=>'<div class="req"><b>'+esc(r[0])+':</b><span>'+esc(r[1])+'</span></div>').join('')}
function renderArticle(item){state.active=item;document.getElementById('crumbProduct').textContent=item.product.replace('SocketJack ','');document.title=item.title+' | SocketJack Documentation';let memberHtml='';if(item.id.endsWith('members'))memberHtml=renderMembers(item.productId);document.getElementById('article').innerHTML='<span class="badge">'+esc(item.category)+'</span><h1>'+esc(item.title)+'</h1><p class="summary">'+esc(item.summary)+'</p><button class="secondary" type="button" onclick="summarizeArticle()">✦ Summarize this article for me</button><div class="signature"><div class="sig-head"><span>C#</span><button type="button" onclick="copySignature()">▣ Copy</button></div><pre><code id="signature">'+esc(item.signature||'')+'</code></pre></div><section class="section" id="returns"><h2>Returns</h2><p>'+esc(item.returns||'Reference material for this SocketJack area.')+'</p></section><section class="section" id="remarks"><h2>Remarks</h2><div class="callout">⚠ '+esc(item.remarks||'Use the linked source and requirements before copying this API into production code.')+'</div>'+memberHtml+'</section><section class="section" id="requirements"><h2>Requirements</h2><div class="requirements">'+requirementRows(item)+'</div></section><section class="feedback"><div class="feedback-card"><strong>● Collaborate with us</strong><p>Open the source from the SocketJack repository or report a documentation issue from Troubleshooting.</p><a href="https://github.com/JackOfFates/SocketJack" target="_blank" rel="noopener">Open GitHub ↗</a></div><div class="feedback-card"><strong>◆ SocketJack feedback</strong><p>Ask for help, Q&A, or report errors with screenshots and exception text.</p><a href="/issues">Troubleshooting →</a></div></section><span class="updated">Last updated on 05/24/2026</span>';renderToc();renderTree();if(item.id.endsWith('members'))ensureMembers()}
function renderToc(){document.getElementById('toc').innerHTML=['returns','remarks','requirements'].map(id=>'<a href="#'+id+'">› '+id[0].toUpperCase()+id.slice(1)+'</a>').join('')}
function openItem(id){const item=byId.get(id)||items[0];history.replaceState(null,'','#'+encodeURIComponent(id));renderArticle(item)}
function copySignature(){navigator.clipboard.writeText(document.getElementById('signature').textContent||'')}
function summarizeArticle(){const item=state.active;alert(item.title+'\\n\\n'+item.summary+'\\n\\nDocs link: '+location.href)}
function renderMembers(productId){const members=state.members.filter(m=>productId==='workstation'?m.path.startsWith('JackLLM.Workstation/'):!m.path.startsWith('JackLLM.Workstation/'));if(state.loadingMembers&&!members.length)return '<div class="empty">Loading source members from GitHub raw content...</div>';const list=members.length?members:items.filter(x=>x.category==='APIs'&&x.productId===productId).map(x=>({kind:'API',name:x.title,signature:x.signature,path:(x.requirements||[]).find(r=>r[0]==='Source')?.[1]||'embedded docs'}));return '<div class="member-list">'+list.slice(0,700).map(m=>'<div class="member"><strong>'+esc((m.kind||'member')+' → '+m.name)+'</strong><code>'+esc(m.signature)+'</code><span class="meta">'+esc(m.path)+'</span></div>').join('')+'</div>'}
async function ensureMembers(){if(state.members.length||state.loadingMembers)return;state.loadingMembers=true;const found=[];const rx=/^\s*public\s+(?:(?:sealed|static|abstract|partial|async|virtual|override|new)\s+)*(class|interface|enum|struct|record|delegate|[A-Za-z0-9_<>,.?\[\]]+)\s+([A-Z][A-Za-z0-9_]+)\s*(?:\(|:|\{|=>|where|;|$)/gm;for(const path of repoData.sourceFiles){try{const text=await fetch(repoData.rawBase+path,{cache:'force-cache'}).then(r=>r.ok?r.text():'');let m;while((m=rx.exec(text))){const line=text.slice(0,m.index).split('\n').length;found.push({kind:m[1],name:m[2],signature:m[0].trim(),path:path+'#L'+line})}}catch{}}state.members=found;state.loadingMembers=false;if(state.active&&state.active.id.endsWith('members'))renderArticle(state.active)}

document.getElementById('clear').onclick=()=>{document.getElementById('search').value='';state.query='';renderTree()};
document.getElementById('summarize').onclick=summarizeArticle;
openItem(decodeURIComponent(location.hash.replace(/^#/,'')||'socketjack-start'));
</script>
