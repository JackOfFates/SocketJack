name: "Build and sign JackLLM"

on:
  workflow_dispatch:
  push:
    tags:
      - "lmvsproxy-v*"

jobs:
  build-sign:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore updater runtime
        run: dotnet restore .\JackLLMUpdater\JackLLMUpdater.csproj -r win-x64 --nologo

      - name: Restore solution
        run: dotnet restore .\SocketJack.sln --nologo

      - name: Build installer
        run: dotnet build .\JackLLMInstaller\JackLLMInstaller.wixproj --configuration Release --no-restore -p:ErrorOnDuplicatePublishOutputFiles=false

      - name: Validate signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.CODE_SIGNING_PFX_BASE64 }}")) {
            throw "CODE_SIGNING_PFX_BASE64 is required for production signing. Run tools\Set-GitHubSigningSecrets.ps1 with the production PFX."
          }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.CODE_SIGNING_PFX_PASSWORD }}")) {
            throw "CODE_SIGNING_PFX_PASSWORD is required for production signing. Run tools\Set-GitHubSigningSecrets.ps1 with the production PFX."
          }

      - name: Materialize signing certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Sign installer artifacts
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path . -Recurse -Include *.msi,*.exe |
            Where-Object { $_.FullName -match '\\(bin|artifacts)\\Release\\' }
          foreach ($artifact in $artifacts) {
            .\tools\Sign-JackLLMInstaller.ps1 `
              -Path $artifact.FullName `
              -CertificatePath "$env:RUNNER_TEMP\codesign.pfx" `
              -CertificatePassword "${{ secrets.CODE_SIGNING_PFX_PASSWORD }}"
          }

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lmvsproxy-signed-artifacts
          path: |
            **/bin/Release/**/*.msi
            **/bin/Release/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.exe
