<style>

t{min-height:0;overflow:auto;padding:10px}.test-left{border-right:1px solid var(--line);background:#0b111b}.generated-form{display:grid;gap:8px}.field{display:grid;gap:5px}.field span{font-weight:800;color:#dbeafe}.history{display:grid;gap:7px}.history button{text-align:left}.log{font:800 11px/1.5 Consolas,monospace;color:#a9b8ce;white-space:pre-wrap;overflow-wrap:anywhere}.output{min-height:260px;white-space:pre-wrap;overflow:auto;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#050914;color:#dbeafe;padding:10px;font:12px/1.5 Consolas,monospace}.hidden{display:none!important}button,input,textarea,select{font:inherit}button{min-height:32px;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:#111a28;color:#eef6ff;padding:6px 9px;font-weight:850;cursor:pointer}button:hover{border-color:rgba(102,199,255,.55)}button.primary{border-color:rgba(53,224,161,.48);background:#0f2c24}button.warn{border-color:rgba(244,193,82,.48);background:#2b2110}button.danger{border-color:rgba(251,113,133,.48);background:#2a1118}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:#070d16;color:var(--ink);padding:7px 8px;outline:none}textarea{resize:vertical;min-height:96px}input:focus,textarea:focus,select:focus{border-color:rgba(53,224,161,.55);box-shadow:0 0 0 3px rgba(53,224,161,.11)}label{display:grid;gap:5px;color:#dce8f7;font-weight:750}.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.pill{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:3px 7px;color:#aebcd0;font:800 10px Consolas,monospace}.workflow-list{display:grid;gap:6px}.workflow-list button{justify-content:flex-start;text-align:left;overflow:hidden;text-overflow:ellipsis}.empty{color:#718096;font-style:italic}.toast{position:fixed;right:12px;bottom:12px;max-width:min(520px,calc(100% - 24px));border:1px solid rgba(102,199,255,.35);border-radius:8px;background:#0d1724;color:#e6f4ff;padding:10px 12px;box-shadow:0 20px 70px rgba(0,0,0,.35)}@media(max-width:920px){.workspace{grid-template-columns:1fr;grid-template-rows:minmax(360px,var(--split)) 8px minmax(360px,1fr)}.divider{cursor:row-resize}.builder-body,.test-grid{grid-template-columns:1fr}.side,.inspector,.test-left{border:0;border-bottom:1px solid var(--line)}.canvas{min-width:900px}.top{grid-template-columns:1fr}.toolbar{overflow:auto}.user{display:none}}
.toolbar{position:relative}.field-wrap{position:relative}.field-label{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}.field-title{min-width:0;overflow:hidden;text-overflow:ellipsis}.field-tools{display:flex;align-items:center;gap:5px}.assist-status{color:#7dd3fc;font:800 10px Consolas,monospace}.help-dot{position:relative;width:20px;height:20px;min-height:20px;padding:0;border:1px solid rgba(96,165,250,.72);border-radius:999px!important;background:#0b2343;color:#bfdbfe;font:900 12px Consolas,monospace;line-height:1}.help-dot:hover,.help-dot:focus-visible{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(96,165,250,.16),0 0 18px rgba(96,165,250,.30);outline:none}.help-dot>.help-tip{display:none!important}.page-help-tip{position:fixed;left:0;top:0;z-index:10000;width:min(340px,calc(100vw - 24px));max-height:min(320px,calc(100vh - 24px));overflow:auto;pointer-events:none;border:1px solid rgba(96,165,250,.42);border-radius:8px;background:#07111f;color:#dbeafe;padding:9px 10px;box-shadow:0 18px 52px rgba(0,0,0,.48);text-align:left;font:12px/1.45 "Segoe UI",system-ui,sans-serif}.page-help-tip.hidden{display:none!important}.page-help-tip b{display:block;margin-bottom:4px;color:#eff6ff}.page-help-tip code{display:block;margin-top:6px;border:1px solid rgba(255,255,255,.10);border-radius:6px;background:#040a13;color:#bfdbfe;padding:5px 6px;font:11px/1.45 Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere}.suggest-pop{position:absolute;left:0;right:0;top:100%;z-index:16;max-height:230px;overflow:auto;border:1px solid rgba(102,199,255,.38);border-radius:8px;background:#07111f;box-shadow:0 18px 52px rgba(0,0,0,.42);padding:5px;margin-top:4px}.suggest-item{display:grid;gap:2px;width:100%;min-height:34px;border:0;border-radius:6px;background:transparent;color:#e8f4ff;text-align:left;padding:6px 8px}.suggest-item strong{font-size:12px;overflow:hidden;text-overflow:ellipsis}.suggest-item span{color:#94a3b8;font:10px/1.35 Consolas,monospace;overflow:hidden;text-overflow:ellipsis}.suggest-item.active,.suggest-item:hover,.suggest-item:focus-visible{background:#0d2a3c;outline:none}
.workspace{grid-template-columns:1fr!important;grid-template-rows:minmax(360px,var(--split)) 8px minmax(340px,1fr)!important}.divider{cursor:row-resize!important;border-left:0!important;border-right:0!important;border-top:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,255,255,.09)}.builder-body{grid-template-columns:190px minmax(0,1fr) 260px}.node{overflow:visible}.node.terminal .node-kind{background:#f0abfc}.node-port{position:absolute;top:50%;width:14px;height:14px;border:2px solid rgba(102,199,255,.78);border-radius:999px;background:#07111f;box-shadow:0 0 14px rgba(102,199,255,.32);transform:translateY(-50%);cursor:crosshair;z-index:4}.node-port.in{left:-8px}.node-port.out{right:-8px;border-color:rgba(53,224,161,.82);box-shadow:0 0 14px rgba(53,224,161,.32)}.node-port:hover,.node-port.connecting{transform:translateY(-50%) scale(1.18);box-shadow:0 0 0 4px rgba(102,199,255,.14),0 0 20px rgba(102,199,255,.44)}.node-port.out:hover,.node-port.out.connecting{box-shadow:0 0 0 4px rgba(53,224,161,.14),0 0 20px rgba(53,224,161,.44)}.edge-path{pointer-events:stroke;cursor:pointer}.edge-path:hover{stroke:#fda4af!important;stroke-width:4!important}.rich-output{white-space:normal;display:grid;gap:10px;font:13px/1.45 "Segoe UI",system-ui,sans-serif}.preview-head{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}.preview-title{font-weight:950;color:#f8fbff}.preview-meta{color:#9aa8bd;font:800 10px Consolas,monospace}.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.preview-card{display:grid;gap:8px;min-width:0;border:1px solid rgba(255,255,255,.13);border-radius:8px;background:linear-gradient(145deg,rgba(17,26,40,.96),rgba(5,9,20,.96));padding:10px}.preview-card h3{margin:0;font-size:13px;overflow-wrap:anywhere}.preview-card small{color:#9aa8bd;font:800 10px Consolas,monospace;overflow-wrap:anywhere}.preview-media{display:grid;place-items:center;min-height:118px;border:1px solid rgba(255,255,255,.10);border-radius:8px;background:#050914;overflow:hidden}.preview-media img,.preview-media video{display:block;max-width:100%;max-height:320px;border-radius:6px}.preview-media audio{width:100%}.preview-file-icon{font:950 34px Consolas,monospace;color:#baf7e6}.preview-text,.preview-json{max-height:320px;overflow:auto;border:1px solid rgba(255,255,255,.10);border-radius:8px;background:#050914;color:#dbeafe;padding:9px;font:12px/1.5 Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere}.preview-frame{width:100%;height:320px;border:0;background:#fff;border-radius:6px}.preview-actions{display:flex;gap:8px;flex-wrap:wrap}.preview-actions a{display:inline-flex;align-items:center;min-height:30px;border:1px solid rgba(53,224,161,.42);border-radius:8px;background:#0f2c24;color:#eafff6;text-decoration:none;padding:5px 9px;font-weight:900}.preview-raw{border:1px solid rgba(255,255,255,.10);border-radius:8px;background:#080f1b}.preview-raw summary{cursor:pointer;padding:8px 10px;color:#bfdbfe;font-weight:900}.preview-raw pre{margin:0;border-top:1px solid rgba(255,255,255,.10);padding:10px;max-height:360px;overflow:auto;white-space:pre-wrap;overflow-wrap:anywhere;color:#dbeafe;font:12px/1.5 Consolas,monospace}

</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="mark">B</div><div>Builder</div></div>
    <div class="toolbar">
      <input id="workflowName" placeholder="Workflow name"><button type="button" class="help-dot" aria-label="Help for workflow name">?<span class="help-tip"><b>Workflow name</b>Human-readable name saved with this graph.<code>Support Ticket Router</code></span></button>
      <input id="apiName" placeholder="custom-api-name"><button type="button" class="help-dot" aria-label="Help for custom API name">?<span class="help-tip"><b>Custom API name</b>Unique URL-safe slug published at /api/&lt;name&gt;.<code>support-ticket-router</code></span></button>
      <button id="newWorkflow">New</button>
      <button id="saveWorkflow" class="primary">Save</button>
      <button id="publishWorkflow" class="warn">Publish</button>
      <a id="outputLink" class="pill" href="#" target="_blank">output</a>
    </div>
    <div class="user" id="sessionUser">checking session</div>
  </header>
  <main class="workspace" id="workspace">
    <section class="pane">
      <div class="pane-head"><div><div class="pane-title">Builder</div><div class="small" id="workflowStatus">unsaved</div></div><div class="row"><span class="pill" id="nodeCount">0 nodes</span><span class="pill" id="edgeCount">0 edges</span></div></div>
      <div class="builder-body">
        <aside class="side">
          <div class="section">
            <h2>Workflows</h2>
            <div class="workflow-list" id="workflowList"></div>
          </div>
          <div class="section">
            <h2>Nodes</h2>
            <div class="palette" id="palette"></div>
          </div>
          <div class="section">
            <h2>Graph</h2>
            <button id="linkNode">Link Selected</button>
            <button id="autoWire">Auto Wire</button>
            <button id="deleteNode" class="danger">Delete Node</button>
          </div>
        </aside>
        <div class="canvas-wrap" id="canvasWrap">
          <div class="canvas" id="canvas"><svg class="edges" id="edges"></svg></div>
        </div>
        <aside class="inspector">
          <div class="section">
            <h2>Inspector</h2>
            <div id="inspectorBody" class="empty">Select a node.</div>
          </div>
        </aside>
      </div>
    </section>
    <div class="divider" id="divider" title="Resize"></div>
    <section class="pane">
      <div class="pane-head"><div><div class="pane-title">Tester</div><div class="small" id="testerStatus">ready</div></div><button id="runWorkflow" class="primary">Run</button></div>
      <div class="tester-body">
        <div class="tabs"><button class="tab active" data-tab="form">Form</button><button class="tab" data-tab="raw">Raw</button><button class="tab" data-tab="history">History</button></div>
        <div class="test-grid">
          <div class="test-left">
            <div id="tabForm"><form class="generated-form" id="generatedForm"></form></div>
            <div id="tabRaw" class="hidden"><label class="field-wrap"><span class="field-label"><span class="field-title">POST JSON</span><span class="field-tools"><button type="button" class="help-dot" aria-label="Help for POST JSON">?<span class="help-tip"><b>POST JSON</b>Raw tester payload. Use an inputs object for direct workflow runs.<code>{"inputs":{"prompt":"hello"}}</code></span></button></span></span><textarea id="rawJson"></textarea></label><label class="field-wrap"><span class="field-label"><span class="field-title">Query string</span><span class="field-tools"><button type="button" class="help-dot" aria-label="Help for Query string">?<span class="help-tip"><b>Query string</b>URL-style tester inputs.<code>prompt=hello&amp;mode=tools</code></span></button></span></span><input id="queryText" placeholder="prompt=hello"></label></div>
            <div id="tabHistory" class="hidden"><div class="history" id="runHistory"></div></div>
          </div>
          <div class="test-right">
            <div class="section"><h2>Output</h2><div class="output rich-output" id="output"></div></div>
            <div class="section"><h2>Logs</h2><div class="log" id="logs"></div></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
<div id="toast" class="toast hidden"></div>
<div id="pageHelpTip" class="page-help-tip hidden" role="tooltip"></div>
<script>
const $=id=>document.getElementById(id);
const state={workflows:[],workflow:null,selected:null,drag:null,connect:null,tab:'form',linkFrom:null,servers:[],reflection:{loaded:false,types:[],byName:{},namedObjects:[]}};
const palette=[
  ['input','Input'],['agent','Agent'],['reflectionObject','Object'],['reflectionCall','Call'],
  ['parallel','Parallel'],['timer','Timer'],['logicGate','Gate'],['terminal','Terminal'],['return','Return'],['outputSchema','Schema']
];
function uid(prefix){return prefix+'_'+crypto.randomUUID().replaceAll('-','')}
function slug(v){return String(v||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').replace(/-{2,}/g,'-')}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),3200)}
function log(msg){$('logs').textContent=new Date().toLocaleTimeString()+'  '+msg+'\n'+$('logs').textContent}
function sameOriginWindow(win){try{return !!win&&win.location&&win.location.origin===location.origin}catch{return false}}
function authWindows(){const wins=[window];try{if(parent&&parent!==window&&sameOriginWindow(parent))wins.push(parent)}catch{}try{if(top&&top!==window&&sameOriginWindow(top)&&!wins.includes(top))wins.push(top)}catch{}try{if(opener&&sameOriginWindow(opener)&&!wins.includes(opener))wins.push(opener)}catch{}return wins}
function readCookieFrom(win,name){try{return String(win.document.cookie||'').split(';').map(x=>x.trim()).reduce((found,part)=>{if(found)return found;const eq=part.indexOf('=');if(eq<0)return'';return part.slice(0,eq)===name?decodeURIComponent(part.slice(eq+1)):''},'')}catch{return''}}
function readCookie(name){for(const win of authWindows()){const value=readCookieFrom(win,name);if(value)return value}return''}
function writeCookie(name,value,days){try{document.cookie=name+'='+encodeURIComponent(value)+'; Path=/; Max-Age='+(days*86400)+'; SameSite=Lax'+(location.protocol==='https:'?'; Secure':'')}catch{}}
function safeStorageGet(name){for(const win of authWindows()){for(const key of ['localStorage','sessionStorage']){try{const store=win[key];const value=store&&store.getItem(name);if(value)return value}catch{}}}return''}
function safeStorageSet(name,value){let saved=false;for(const key of ['localStorage','sessionStorage']){try{const store=window[key];if(store){store.setItem(name,value);saved=true}}catch{}}return saved}
function urlAuthToken(){try{const qs=new URLSearchParams(location.search);const token=qs.get('socketjack_auth')||qs.get('access_token')||qs.get('authToken')||qs.get('token')||'';if(!token)return'';safeStorageSet('SocketJackAccessToken',token);writeCookie('SocketJackAuth',token,1);['socketjack_auth','access_token','authToken','token'].forEach(k=>qs.delete(k));history.replaceState(null,'',location.pathname+(qs.toString()?'?'+qs.toString():'')+location.hash);return token}catch{return''}}
function rememberSocketJackAuth(data){if(!data)return;const token=String(data.accessToken||data.access_token||data.authToken||data.token||'');if(token){safeStorageSet('SocketJackAccessToken',token);writeCookie('SocketJackAuth',token,365)}const user=String(data.username||data.userName||data.loginName||'').trim();if(user)writeCookie('SocketJackLoginName',user,365)}
function readSocketJackToken(){const token=urlAuthToken()||safeStorageGet('SocketJackAccessToken')||readCookie('SocketJackAuth')||readCookie('LmVsProxyAuth');if(token){safeStorageSet('SocketJackAccessToken',token);writeCookie('SocketJackAuth',token,1)}return token}
function readSocketJackUser(){return readCookie('SocketJackLoginName')||safeStorageGet('SocketJackLoginName')||''}
function authHeaders(extra){const headers=Object.assign({},extra||{});const token=readSocketJackToken();const user=readSocketJackUser();if(token){headers.Authorization='Bearer '+token;headers['X-SocketJack-Auth']=token}if(user){headers['X-SocketJack-User']=user;headers['X-SocketJack-Username']=user}return headers}
let authRefreshPromise=null;
async function refreshSocketJackAuth(force=false){if(!force&&readSocketJackToken())return null;if(authRefreshPromise)return authRefreshPromise;authRefreshPromise=fetch('/api/web-auth/session',{cache:'no-store',credentials:'include',headers:authHeaders({'Accept':'application/json'})}).then(async res=>{const text=await res.text();let data;try{data=JSON.parse(text)}catch{data=null}if(res.ok&&data&&data.authenticated!==false)rememberSocketJackAuth(data);return data}).catch(()=>null).finally(()=>{authRefreshPromise=null});return authRefreshPromise}
async function api(path,opts={}){await refreshSocketJackAuth(false);const next=Object.assign({},opts);const isForm=typeof FormData!=='undefined'&&next.body instanceof FormData;const baseHeaders={'Accept':'application/json'};if(!isForm)baseHeaders['Content-Type']='application/json';next.credentials='include';next.headers=authHeaders(Object.assign(baseHeaders,next.headers||{}));let res=await fetch(path,next);if(res.status===401){await refreshSocketJackAuth(true);next.headers=authHeaders(Object.assign(baseHeaders,opts.headers||{}));res=await fetch(path,next)}const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={raw:text}}if(!res.ok)throw new Error(data.error||('HTTP '+res.status));return data}
function plainObject(v){return v&&typeof v==='object'&&!Array.isArray(v)}
function firstProp(obj,names){if(!plainObject(obj))return'';for(const name of names){const value=obj[name];if(value!==undefined&&value!==null&&String(value).trim()!=='')return value}return''}
function isDataUrl(value){return /^data:[^,]+,/i.test(String(value||''))}
function mimeFromDataUrl(value){const m=String(value||'').match(/^data:([^;,]+)/i);return m?m[1]:''}
function extFromMime(mime){mime=String(mime||'').toLowerCase();if(mime.includes('png'))return'.png';if(mime.includes('jpeg')||mime.includes('jpg'))return'.jpg';if(mime.includes('gif'))return'.gif';if(mime.includes('webp'))return'.webp';if(mime.includes('svg'))return'.svg';if(mime.includes('mp4'))return'.mp4';if(mime.includes('webm'))return'.webm';if(mime.includes('quicktime'))return'.mov';if(mime.includes('mpeg'))return'.mp3';if(mime.includes('wav'))return'.wav';if(mime.includes('ogg'))return'.ogg';if(mime.includes('pdf'))return'.pdf';if(mime.includes('html'))return'.html';if(mime.includes('json'))return'.json';if(mime.includes('csv'))return'.csv';if(mime.startsWith('text/'))return'.txt';return'.bin'}
function safeDownloadName(name,mime,index){name=String(name||'').split(/[?#]/)[0].split(/[\\/]/).pop().replace(/[^a-z0-9._ -]+/gi,'-').replace(/^-+|-+$/g,'')||('agent-output-'+index);if(!/\.[a-z0-9]{1,8}$/i.test(name))name+=extFromMime(mime);return name}
function inferKind(type,mime,name,src,value){const text=[type,mime,name,src].map(x=>String(x||'').toLowerCase()).join(' ');if(/^image\//i.test(mime)||/\bimage\b|\.png\b|\.jpe?g\b|\.gif\b|\.webp\b|\.svg\b/.test(text))return'image';if(/^video\//i.test(mime)||/\bvideo\b|\.mp4\b|\.webm\b|\.mov\b|\.m4v\b/.test(text))return'video';if(/^audio\//i.test(mime)||/\baudio\b|\.mp3\b|\.wav\b|\.ogg\b|\.m4a\b/.test(text))return'audio';if(/html/.test(text))return'html';if(/json/.test(text))return'json';if(/plain|text/.test(text)&&typeof value==='string')return'text';if(src||/file|download|attachment|\.pdf\b|\.zip\b|\.csv\b|\.bin\b/.test(text))return'file';return''}
function sourceFrom(obj,mime){const direct=firstProp(obj,['dataUrl','contentDataUrl','downloadUrl','fileUrl','contentUrl','url','href','src','uri']);if(typeof direct==='string'&&direct.trim())return direct.trim();const base64=firstProp(obj,['base64','contentBase64']);if(typeof base64==='string'&&base64.trim())return 'data:'+(mime||'application/octet-stream')+';base64,'+base64.trim();const value=firstProp(obj,['value','data','content']);if(typeof value==='string'){const trimmed=value.trim();if(isDataUrl(trimmed)||/^(https?:|\/)/i.test(trimmed))return trimmed;if(mime&&!/^text\//i.test(mime)&&!/(json|html|xml)/i.test(mime)&&trimmed.length>80&&/^[a-z0-9+/=\s]+$/i.test(trimmed))return 'data:'+mime+';base64,'+trimmed}return''}
function textFrom(obj){const value=firstProp(obj,['value','text','content','body','html','raw']);if(typeof value==='string')return value;return''}
function mediaItem(obj,path,index){if(!plainObject(obj))return null;let mime=String(firstProp(obj,['mimeType','contentType','mediaType'])||'');let type=String(firstProp(obj,['outputType','returnType','type','kind'])||'');let name=String(firstProp(obj,['fileName','filename','name','title','path'])||path||'');let src=sourceFrom(obj,mime);if(!mime&&isDataUrl(src))mime=mimeFromDataUrl(src);let text=textFrom(obj);let value=firstProp(obj,['value','data','content']);let kind=inferKind(type,mime,name,src,text||value);if(!kind)return null;if((kind==='html'||kind==='text'||kind==='json')&&!text&&value!==''&&value!==undefined&&value!==null)text=typeof value==='string'?value:JSON.stringify(value,null,2);if(!mime){if(kind==='html')mime='text/html';else if(kind==='json')mime='application/json';else if(kind==='text')mime='text/plain';else if(kind==='file')mime='application/octet-stream'}return{kind,mime,name:safeDownloadName(name,mime,index),src,text,path}}
function collectGeneratedContent(root){const items=[],seen=new Set();function add(item){if(!item)return;const sig=[item.kind,item.name,item.src,item.text&&item.text.slice(0,80),item.path].join('|');if(seen.has(sig)||items.length>=36)return;seen.add(sig);items.push(item)}function walk(value,path,depth){if(value==null||depth>7||items.length>=36)return;if(Array.isArray(value)){value.forEach((x,i)=>walk(x,path+'['+i+']',depth+1));return}if(plainObject(value)){add(mediaItem(value,path,items.length+1));for(const [key,next] of Object.entries(value)){if(['inputs'].includes(key))continue;walk(next,path?path+'.'+key:key,depth+1)}return}if(typeof value==='string'){const trimmed=value.trim();if(isDataUrl(trimmed)||/^(https?:|\/).+\.(png|jpe?g|gif|webp|svg|mp4|webm|mov|m4v|mp3|wav|ogg|pdf|zip|json|txt|html|csv)([?#].*)?$/i.test(trimmed)){const mime=isDataUrl(trimmed)?mimeFromDataUrl(trimmed):'';add({kind:inferKind('',mime,path,trimmed,''),mime,name:safeDownloadName(path,mime,items.length+1),src:trimmed,text:'',path})}}}walk(root,'output',0);return items}
function makeDownloadUrl(item){if(item.src)return item.src;if(item.text!=null){try{return URL.createObjectURL(new Blob([item.text],{type:item.mime||'text/plain'}))}catch{}}return''}
function renderGeneratedCard(item,index){const card=document.createElement('article');card.className='preview-card';const title=document.createElement('h3');title.textContent=item.name||('Output '+index);card.appendChild(title);const meta=document.createElement('small');meta.textContent=(item.kind||'file')+(item.mime?' | '+item.mime:'')+(item.path?' | '+item.path:'');card.appendChild(meta);const media=document.createElement('div');media.className='preview-media';if(item.kind==='image'&&item.src){const img=document.createElement('img');img.alt=item.name;img.src=item.src;media.appendChild(img)}else if(item.kind==='video'&&item.src){const video=document.createElement('video');video.controls=true;video.src=item.src;media.appendChild(video)}else if(item.kind==='audio'&&item.src){const audio=document.createElement('audio');audio.controls=true;audio.src=item.src;media.appendChild(audio)}else if(item.kind==='html'&&(item.text||item.src)){const frame=document.createElement('iframe');frame.className='preview-frame';frame.sandbox='allow-forms allow-popups allow-scripts';if(item.src)frame.src=item.src;else frame.srcdoc=item.text;media.appendChild(frame)}else if(item.kind==='json'||item.kind==='text'){const pre=document.createElement('pre');pre.className=item.kind==='json'?'preview-json':'preview-text';pre.textContent=item.text||'';media.appendChild(pre)}else{const icon=document.createElement('div');icon.className='preview-file-icon';icon.textContent=(item.kind||'file').slice(0,4).toUpperCase();media.appendChild(icon)}card.appendChild(media);const actions=document.createElement('div');actions.className='preview-actions';const url=makeDownloadUrl(item);if(url){const a=document.createElement('a');a.href=url;a.download=item.name||('agent-output-'+index);a.textContent='Download';actions.appendChild(a);const open=document.createElement('a');open.href=url;open.target='_blank';open.rel='noopener';open.textContent='Open';actions.appendChild(open)}card.appendChild(actions);return card}
function renderOutputPreview(target,data){target.textContent='';target.classList.add('rich-output');const result=data&&data.result?data.result:data;if(data&&data.renderedOutput&&plainObject(result))result.renderedOutput={outputType:'html',mimeType:'text/html',fileName:'builder-output.html',value:String(data.renderedOutput)};const content=result&&Object.prototype.hasOwnProperty.call(result,'output')?result.output:result;const items=collectGeneratedContent(content).concat(collectGeneratedContent(result&&result.renderedOutput?result.renderedOutput:null)).concat(collectGeneratedContent(result&&result.nodeResults?result.nodeResults:[]));const head=document.createElement('div');head.className='preview-head';const title=document.createElement('div');title.className='preview-title';title.textContent=items.length?'Generated content':'JSON output';const meta=document.createElement('div');meta.className='preview-meta';meta.textContent=(result&&result.status?result.status:'ready')+(result&&result.durationMs!=null?' | '+result.durationMs+' ms':'');head.append(title,meta);target.appendChild(head);if(items.length){const grid=document.createElement('div');grid.className='preview-grid';items.slice(0,24).forEach((item,i)=>grid.appendChild(renderGeneratedCard(item,i+1)));target.appendChild(grid)}else{const pre=document.createElement('pre');pre.className='preview-json';pre.textContent=typeof content==='string'?content:JSON.stringify(content,null,2);target.appendChild(pre)}const details=document.createElement('details');details.className='preview-raw';const summary=document.createElement('summary');summary.textContent='Raw result JSON';const raw=document.createElement('pre');raw.textContent=JSON.stringify(result,null,2);details.append(summary,raw);target.appendChild(details)}
function uniqItems(items){const seen=new Set(),out=[];(items||[]).forEach(item=>{const value=String(item&&item.value!=null?item.value:item||'').trim();if(!value||seen.has(value.toLowerCase()))return;seen.add(value.toLowerCase());out.push(typeof item==='object'?Object.assign({},item,{value}):{value,label:value,detail:''})});return out}

function attachSuggest(input,node,key){let pop=null,active=-1;input.autocomplete='off';input.spellcheck=false;function ensurePop(){if(pop)return pop;pop=document.createElement('div');pop.className='suggest-pop';pop.hidden=true;input.parentElement.appendChild(pop);return pop}function render(items){pop=ensurePop();input._suggestItems=items;pop.innerHTML='';active=Math.min(active,items.length-1);items.forEach((item,index)=>{const b=document.createElement('button');b.type='button';b.className='suggest-item'+(index===active?' active':'');b.innerHTML='<strong>'+esc(item.label||item.value)+'</strong><span>'+esc(item.detail||item.value)+'</span>';b.onmousedown=e=>{e.preventDefault();apply(item)};pop.appendChild(b)});pop.hidden=!items.length}function show(){render(fieldSuggestions(node,key,input.value))}function hide(){if(pop)pop.hidden=true}function setActive(next){const items=input._suggestItems||[];if(!items.length){show();return}active=(next+items.length)%items.length;render(items)}function apply(item){input.value=item.value;input.dispatchEvent(new Event('input',{bubbles:true}));hide()}input.addEventListener('focus',show);input.addEventListener('input',show);input.addEventListener('blur',()=>setTimeout(hide,140));input.addEventListener('keydown',e=>{const visible=pop&&!pop.hidden;if(e.key==='ArrowDown'){e.preventDefault();if(!visible)show();setActive(active+1)}else if(e.key==='ArrowUp'){e.preventDefault();if(!visible)show();setActive(active-1)}else if(e.key==='Tab'&&visible){e.preventDefault();setActive(active<0?0:active+1)}else if(e.key==='Enter'&&visible){const items=input._suggestItems||[];if(items.length){e.preventDefault();apply(items[Math.max(0,active)])}}else if((e.ctrlKey||e.metaKey)&&e.key===' '){e.preventDefault();show()}})}

function renderCanvas(){const c=$('canvas');[...c.querySelectorAll('.node')].forEach(n=>n.remove());const v=validateLocal();(state.workflow.nodes||[]).forEach(n=>{const el=document.createElement('div');el.className=nodeClass(n);el.style.left=(n.x||80)+'px';el.style.top=(n.y||80)+'px';el.dataset.id=n.id;const mark=v.errors.some(x=>x.nodeId===n.id)?' !':v.warnings.some(x=>x.nodeId===n.id)?' ?':'';el.innerHTML='<button type="button" class="node-port in" data-node="'+esc(n.id)+'" data-port="in" aria-label="Input port"></button><button type="button" class="node-port out" data-node="'+esc(n.id)+'" data-port="out" aria-label="Output port"></button><div class="node-head"><span>'+esc(n.name||n.type)+esc(mark)+'</span><span class="node-kind">'+esc(shortType(n.type))+'</span></div><div class="node-body">'+nodeSummary(n)+'</div>';el.addEventListener('pointerdown',startDrag);el.addEventListener('click',e=>{if(e.target.closest('.node-port'))return;if(state.linkFrom&&state.linkFrom!==n.id){connectNodes(state.linkFrom,n.id);state.linkFrom=null}state.selected=n.id;renderAll();e.stopPropagation()});el.querySelector('.node-port.out').addEventListener('pointerdown',e=>beginConnect(e,n.id));el.querySelector('.node-port.out').addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();removeEdgesForNode(n.id,'out')});el.querySelector('.node-port.in').addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();removeEdgesForNode(n.id,'in')});c.appendChild(el)});drawEdges()}
function drawEdges(){const svg=$('edges');svg.innerHTML='';const nodes=Object.fromEntries((state.workflow.nodes||[]).map(n=>[n.id,n]));(state.workflow.edges||[]).forEach(e=>{const a=nodes[e.sourceId],b=nodes[e.targetId];if(!a||!b)return;const x1=(a.x||0)+164,y1=(a.y||0)+37,x2=(b.x||0),y2=(b.y||0)+37;const path=document.createElementNS('http://www.w3.org/2000/svg','path');const dx=Math.max(70,(x2-x1)/2);path.setAttribute('d',`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`);path.setAttribute('fill','none');path.setAttribute('stroke','rgba(102,199,255,.58)');path.setAttribute('stroke-width','2');path.setAttribute('class','edge-path');path.addEventListener('dblclick',event=>{event.preventDefault();state.workflow.edges=state.workflow.edges.filter(edge=>edge.id!==e.id);renderAll()});svg.appendChild(path)});if(state.connect){const a=nodes[state.connect.sourceId];if(a){const p=clientToCanvas(state.connect.x,state.connect.y),x1=(a.x||0)+164,y1=(a.y||0)+37,x2=p.x,y2=p.y,dx=Math.max(70,(x2-x1)/2);const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`);path.setAttribute('fill','none');path.setAttribute('stroke','rgba(53,224,161,.82)');path.setAttribute('stroke-width','2');path.setAttribute('stroke-dasharray','7 5');svg.appendChild(path)}}}
function clientToCanvas(x,y){const r=$('canvas').getBoundingClientRect();return{x:x-r.left,y:y-r.top}}
function connectNodes(sourceId,targetId){if(!sourceId||!targetId||sourceId===targetId)return;if(!(state.workflow.edges||[]).some(e=>e.sourceId===sourceId&&e.targetId===targetId))state.workflow.edges.push({id:uid('edge'),sourceId,targetId})}
function removeEdgesForNode(id,side){const before=state.workflow.edges.length;state.workflow.edges=state.workflow.edges.filter(e=>side==='in'?e.targetId!==id:e.sourceId!==id);if(before!==state.workflow.edges.length)toast('Disconnected '+(before-state.workflow.edges.length)+' link(s).');renderAll()}
function beginConnect(e,sourceId){e.preventDefault();e.stopPropagation();state.connect={sourceId,x:e.clientX,y:e.clientY};state.selected=sourceId;drawEdges()}
function shortType(t){return String(t||'node').replace(/[a-z]/g,'').slice(0,4)||String(t||'node').slice(0,4)}
function nodeSummary(n){const c=n.config||{};if(n.type==='input')return esc((c.key||n.name)+' - '+(c.type||'text')+(c.required==='true'?' - required':''));if(n.type==='agent')return esc((c.mode||'text')+' - '+(c.model||'auto'));if(n.type==='terminal')return esc((c.terminalShell||'powershell')+' - '+(c.terminalCommand||'command'));if(n.type==='logicGate')return esc((c.left||c.leftRef||'value')+' '+(c.operator||'truthy')+' '+(c.right||''));if(n.type==='reflectionObject')return esc(c.typeName||'SocketJack type');if(n.type==='reflectionCall')return esc((c.objectName||c.typeName||'target')+'.'+(c.memberName||'member'));if(n.type==='timer')return esc(c.kind||'interval');if(n.type==='return')return esc((c.outputType||'auto')+' - '+(c.valueRef||c.template||'last output'));return esc(n.type)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function bindHelpTooltips(){const overlay=$('pageHelpTip');let active=null;function clamp(v,min,max){return Math.max(min,Math.min(max,v))}function rectOverlap(a,b){const x=Math.max(0,Math.min(a.right,b.right)-Math.max(a.left,b.left)),y=Math.max(0,Math.min(a.bottom,b.bottom)-Math.max(a.top,b.top));return x*y}function relatedControls(btn){const list=[];const wrap=btn.closest('.field-wrap');const row=btn.closest('.toolbar');if(wrap)wrap.querySelectorAll('input,textarea,select').forEach(el=>list.push(el));else if(row)row.querySelectorAll('input,textarea,select').forEach(el=>list.push(el));const prev=btn.previousElementSibling;if(prev&&prev.matches&&prev.matches('input,textarea,select'))list.push(prev);return [...new Set(list)].filter(el=>el.offsetParent!==null)}function place(btn){if(!btn||overlay.classList.contains('hidden'))return;const margin=12,gap=8,b=btn.getBoundingClientRect(),controls=relatedControls(btn),avoidRects=controls.map(el=>el.getBoundingClientRect());const primary=avoidRects[0]||b;overlay.style.visibility='hidden';overlay.style.transform='translate(0,0)';overlay.style.left='0px';overlay.style.top='0px';const size=overlay.getBoundingClientRect(),vw=innerWidth,vh=innerHeight,w=size.width,h=size.height;const candidates=[{left:b.right+gap,top:b.top+(b.height-h)/2},{left:b.left-w-gap,top:b.top+(b.height-h)/2},{left:b.left+(b.width-w)/2,top:primary.bottom+gap},{left:b.left+(b.width-w)/2,top:primary.top-h-gap},{left:primary.right-w,top:primary.bottom+gap},{left:primary.left,top:primary.top-h-gap}];let best=null;for(const c of candidates){const left=clamp(c.left,margin,Math.max(margin,vw-w-margin)),top=clamp(c.top,margin,Math.max(margin,vh-h-margin));const r={left,top,right:left+w,bottom:top+h};const overlap=avoidRects.reduce((sum,a)=>sum+rectOverlap(r,a),0);const distance=Math.abs((left+w/2)-(b.left+b.width/2))+Math.abs((top+h/2)-(b.top+b.height/2));const score=overlap*1000+distance;if(!best||score<best.score)best={left,top,score}}overlay.style.left=Math.round(best.left)+'px';overlay.style.top=Math.round(best.top)+'px';overlay.style.visibility='visible'}function show(btn){const source=btn.querySelector('.help-tip');if(!source)return;active=btn;clearTimeout(btn._helpHideTimer);overlay.innerHTML=source.innerHTML;overlay.classList.remove('hidden');btn.setAttribute('aria-describedby','pageHelpTip');place(btn);requestAnimationFrame(()=>place(btn))}function hide(btn){if(btn&&active&&btn!==active){btn.removeAttribute('aria-describedby');return}const target=btn||active;if(target)target.removeAttribute('aria-describedby');active=null;overlay.classList.add('hidden');overlay.innerHTML=''}document.addEventListener('mouseover',e=>{const btn=e.target.closest?.('.help-dot');if(btn&&!btn.contains(e.relatedTarget))show(btn)});document.addEventListener('mouseout',e=>{const btn=e.target.closest?.('.help-dot');if(btn&&!btn.contains(e.relatedTarget))btn._helpHideTimer=setTimeout(()=>hide(btn),60)});document.addEventListener('focusin',e=>{const btn=e.target.closest?.('.help-dot');if(btn)show(btn)});document.addEventListener('focusout',e=>{const btn=e.target.closest?.('.help-dot');if(btn)setTimeout(()=>hide(btn),60)});document.addEventListener('keydown',e=>{if(e.key==='Escape')hide()});window.addEventListener('scroll',()=>{if(active)place(active)},true);window.addEventListener('resize',()=>{if(active)place(active)})}
function startDrag(e){if(e.target.closest('.node-port')||state.connect)return;const id=e.currentTarget.dataset.id;state.selected=id;const n=state.workflow.nodes.find(x=>x.id===id);state.drag={id,dx:e.clientX-(n.x||0),dy:e.clientY-(n.y||0)};e.currentTarget.setPointerCapture(e.pointerId);renderInspector()}
window.addEventListener('pointermove',e=>{if(state.connect){state.connect.x=e.clientX;state.connect.y=e.clientY;drawEdges();return}if(!state.drag)return;const n=state.workflow.nodes.find(x=>x.id===state.drag.id);if(!n)return;n.x=Math.max(10,e.clientX-state.drag.dx);n.y=Math.max(10,e.clientY-state.drag.dy);renderCanvas()});
window.addEventListener('pointerup',e=>{if(state.connect){const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.node-port.in');if(target&&target.dataset.node&&target.dataset.node!==state.connect.sourceId)connectNodes(state.connect.sourceId,target.dataset.node);else removeEdgesForNode(state.connect.sourceId,'out');state.connect=null;renderAll();return}state.drag=null});
function addNode(type,label){const count=(state.workflow.nodes||[]).length;const id=uid(type.toLowerCase());const config={};if(type==='input')Object.assign(config,{key:'input'+count,label:'Input '+count,type:'text',required:'false'});if(type==='agent')Object.assign(config,{mode:'text',prompt:'{{prompt}}'});if(type==='terminal')Object.assign(config,{mode:'tools',allowTerminal:'true',terminalCommand:'',terminalShell:'powershell',terminalWorkingDirectory:''});if(type==='logicGate')Object.assign(config,{left:'$input_prompt',operator:'truthy'});if(type==='reflectionObject')Object.assign(config,{typeName:'SocketJack.Net.Database.Database',objectName:'db'});if(type==='reflectionCall')Object.assign(config,{objectName:'db',memberName:'ToString'});if(type==='timer')Object.assign(config,{kind:'interval',intervalSeconds:'300'});if(type==='return')Object.assign(config,{outputType:'auto',valueRef:'$'+(state.workflow.nodes.at(-1)?.id||''),mimeType:'',fileName:''});state.workflow.nodes.push({id,type,name:label,x:80+count*36,y:120+count*28,config});state.selected=id;renderAll()}
function renderInspector(){const n=state.workflow.nodes.find(x=>x.id===state.selected);const box=$('inspectorBody');if(!n){box.className='empty';box.textContent='Select a node.';return}box.className='';const keys=configKeysFor(n.type);const reflectionStatus=(n.type==='reflectionObject'||n.type==='reflectionCall')?(state.reflection.loaded?'reflection':'loading'):'';box.innerHTML='<div class="section">'+makeField('Name','<input data-prop="name" data-assist-key="name" value="'+esc(n.name)+'">',fieldGuide(n.type,'name'))+'<label class="field-wrap">'+fieldHead('Type',fieldGuide(n.type,'type'))+'<select data-prop="type">'+palette.map(([t,l])=>'<option value="'+t+'" '+(t===n.type?'selected':'')+'>'+l+'</option>').join('')+'</select></label></div><div class="section"><h2>Config</h2>'+keys.map(k=>makeField(fieldGuide(n.type,k).label||k,'<input data-config="'+esc(k)+'" data-assist-key="'+esc(k)+'" value="'+esc(n.config?.[k]||'')+'" placeholder="'+esc(fieldGuide(n.type,k).example||'')+'">',fieldGuide(n.type,k),k==='typeName'?reflectionStatus:'' )).join('')+'</div>';box.querySelectorAll('input,select').forEach(el=>{el.addEventListener('input',()=>{const typeChanged=el.dataset.prop==='type';if(el.dataset.prop)n[el.dataset.prop]=el.value;if(el.dataset.config){n.config ||= {};n.config[el.dataset.config]=el.value}if(typeChanged){renderAll();return}renderCanvas();renderForm();renderRaw();updateChrome()});if(el.matches('input[data-assist-key]'))attachSuggest(el,n,el.dataset.assistKey)})}
function configKeysFor(type){return {input:['key','label','type','required','default'],agent:['mode','model','modelId','serverId','minParamsB','maxParamsB','premium','disabledModels','allowTerminal','terminalCommand','terminalShell','terminalWorkingDirectory','prompt'],terminal:['serverId','allowTerminal','terminalCommand','terminalShell','terminalWorkingDirectory','prompt'],reflectionObject:['typeName','objectName','args'],reflectionCall:['objectName','typeName','memberName','args'],logicGate:['left','operator','right'],parallel:['children'],timer:['kind','intervalSeconds','timeOfDay','criteria'],return:['outputType','valueRef','mimeType','fileName','template'],outputSchema:['schema']}[type]||['value']}
function renderForm(){const form=$('generatedForm');form.innerHTML='';const inputs=(state.workflow.nodes||[]).filter(n=>n.type==='input');if(!inputs.length){form.innerHTML='<div class="empty">No input nodes.</div>';return}inputs.forEach(n=>{const c=n.config||{},key=c.key||n.name||n.id,type=(c.type||'text').toLowerCase(),guide={label:c.label||key,detail:'Tester value for input key '+key+'. POST JSON/form-data wins, then URL query, then this form value/default.',example:c.default||'sample '+key};const wrap=document.createElement('label');wrap.className='field field-wrap';wrap.innerHTML=fieldHead(c.label||key+(c.required==='true'?' *':''),guide);const input=document.createElement('input');input.name=key;input.type=type.includes('file')?'file':type==='number'?'number':'text';input.value=input.type==='file'?'':(c.default||'');input.placeholder=guide.example||'';input.dataset.file=input.type==='file'?'true':'false';input.dataset.assistKey='default';if(c.required==='true')input.required=true;wrap.appendChild(input);form.appendChild(wrap);if(input.type!=='file')attachSuggest(input,n,'default')})}
function renderRaw(){const sample={workflowId:state.workflow.id,inputs:{}};(state.workflow.nodes||[]).filter(n=>n.type==='input').forEach(n=>sample.inputs[n.config?.key||n.name||n.id]=n.config?.default||'');$('rawJson').value=JSON.stringify(sample,null,2)}
function autoWire(){const nodes=state.workflow.nodes||[];state.workflow.edges=[];for(let i=0;i<nodes.length-1;i++)state.workflow.edges.push({id:uid('edge'),sourceId:nodes[i].id,targetId:nodes[i+1].id});renderAll()}
function validateLocal(){const w=state.workflow||{nodes:[],edges:[]},ids=new Set(),errors=[],warnings=[];(w.nodes||[]).forEach(n=>{if(ids.has(n.id))errors.push({nodeId:n.id,msg:'duplicate node'});ids.add(n.id);if(n.type==='input'&&!(n.config&&n.config.key))errors.push({nodeId:n.id,msg:'input key required'});if(n.type==='agent'&&!(n.config&&(n.config.prompt||n.config.message||n.config.q)))warnings.push({nodeId:n.id,msg:'agent prompt empty'});if(n.type==='reflectionObject'&&!(n.config&&n.config.typeName))errors.push({nodeId:n.id,msg:'typeName required'});if(n.type==='reflectionCall'&&!(n.config&&(n.config.memberName||n.config.method)))errors.push({nodeId:n.id,msg:'memberName required'})});(w.edges||[]).forEach(e=>{if(!ids.has(e.sourceId))errors.push({edgeId:e.id,msg:'missing source'});if(!ids.has(e.targetId))errors.push({edgeId:e.id,msg:'missing target'})});if(!(w.nodes||[]).some(n=>['return','outputSchema'].includes(n.type)))warnings.push({msg:'no return node'});return{errors,warnings}}
async function collectInputs(){if(state.tab==='raw'){let parsed={};try{parsed=JSON.parse($('rawJson').value||'{}')}catch(e){throw new Error('Raw JSON is invalid: '+e.message)}return parsed.inputs||parsed}const inputs={};for(const el of $('generatedForm').elements){if(!el.name)continue;if(el.dataset.file==='true'){const file=el.files&&el.files[0];inputs[el.name]=file?await readFile(file):null}else inputs[el.name]=el.value}return inputs}
function readFile(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve({fileName:file.name,size:file.size,type:file.type,dataUrl:r.result});r.onerror=()=>reject(r.error);r.readAsDataURL(file)})}
async function run(){try{$('testerStatus').textContent='running';const inputs=await collectInputs();const data=await api('/api/agentbuilder/run',{method:'POST',body:JSON.stringify({workflow:state.workflow,inputs})});renderOutputPreview($('output'),data);$('testerStatus').textContent=data.ok?'complete':'failed';log('Run '+(data.ok?'completed':'failed'));loadRuns()}catch(e){$('testerStatus').textContent='failed';$('output').textContent=String(e.message||e);log('Run failed: '+(e.message||e))}}
async function save(){try{state.workflow.name=$('workflowName').value.trim()||state.workflow.name;state.workflow.apiName=slug($('apiName').value);const data=await api('/api/agentbuilder/workflows',{method:'POST',body:JSON.stringify({workflow:state.workflow})});state.workflow=data.workflow;await loadWorkflows(false);setWorkflow(data.workflow);toast('Workflow saved');log('Workflow saved')}catch(e){toast(e.message);log('Save failed: '+e.message)}}
async function publish(){try{await save();const data=await api('/api/agentbuilder/apis/publish',{method:'POST',body:JSON.stringify({workflowId:state.workflow.id,apiName:$('apiName').value})});state.workflow=data.workflow;$('apiName').value=data.api.apiName;updateChrome();toast('Published '+data.api.route);log('Published '+data.url)}catch(e){toast(e.message);log('Publish failed: '+e.message)}}
async function loadSession(){try{const data=await api('/api/agentbuilder/session');$('sessionUser').textContent=data.username+' · '+data.workflowCount+' workflows'}catch(e){$('sessionUser').textContent='login required';log(e.message)}}
async function loadWorkflows(selectFirst=true){try{const data=await api('/api/agentbuilder/workflows');state.workflows=data.workflows||[];if(selectFirst&&state.workflows.length)setWorkflow(state.workflows[0]);else renderWorkflows()}catch(e){log('Workflows failed: '+e.message);if(!state.workflow)setWorkflow(defaultWorkflow())}}
async function loadRuns(){if(!state.workflow?.id)return;try{const data=await api('/api/agentbuilder/runs?workflowId='+encodeURIComponent(state.workflow.id));const h=$('runHistory');h.innerHTML='';(data.runs||[]).forEach(r=>{const b=document.createElement('button');b.textContent=(r.status||'run')+' · '+new Date(r.startedUtc||Date.now()).toLocaleString();b.onclick=()=>{let parsed=r;try{if(typeof r.outputJson==='string'&&r.outputJson.trim())parsed=Object.assign({},r,{output:JSON.parse(r.outputJson)})}catch{}renderOutputPreview($('output'),parsed)};h.appendChild(b)});if(!h.children.length)h.innerHTML='<div class="empty">No runs yet.</div>'}catch(e){$('runHistory').innerHTML='<div class="empty">'+esc(e.message)+'</div>'}}
function bindSplit(){const ws=$('workspace'),d=$('divider');let saved=localStorage.getItem('socketjack.builder.split');if(saved)document.documentElement.style.setProperty('--split',saved);let active=false;d.addEventListener('pointerdown',e=>{active=true;d.setPointerCapture(e.pointerId)});window.addEventListener('pointermove',e=>{if(!active)return;const r=ws.getBoundingClientRect();let pct=((e.clientY-r.top)/r.height)*100;pct=Math.max(25,Math.min(75,pct));const v=pct.toFixed(2)+'%';document.documentElement.style.setProperty('--split',v);localStorage.setItem('socketjack.builder.split',v)});window.addEventListener('pointerup',()=>active=false)}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));$('tabForm').classList.toggle('hidden',state.tab!=='form');$('tabRaw').classList.toggle('hidden',state.tab!=='raw');$('tabHistory').classList.toggle('hidden',state.tab!=='history');if(state.tab==='history')loadRuns()});
$('newWorkflow').onclick=()=>setWorkflow(defaultWorkflow());$('saveWorkflow').onclick=save;$('publishWorkflow').onclick=publish;$('runWorkflow').onclick=run;$('autoWire').onclick=autoWire;$('linkNode').onclick=()=>{state.linkFrom=state.selected;toast(state.linkFrom?'Click the target node.':'Select a node first.')};$('deleteNode').onclick=()=>{if(!state.selected)return;state.workflow.nodes=state.workflow.nodes.filter(n=>n.id!==state.selected);state.workflow.edges=state.workflow.edges.filter(e=>e.sourceId!==state.selected&&e.targetId!==state.selected);state.selected=state.workflow.nodes[0]?.id||null;renderAll()};$('workflowName').oninput=()=>{state.workflow.name=$('workflowName').value;updateChrome()};$('apiName').oninput=()=>{state.workflow.apiName=slug($('apiName').value);updateChrome()};attachSuggest($('workflowName'),null,'workflowName');attachSuggest($('apiName'),null,'apiName');$('canvas').addEventListener('click',()=>{state.selected=null;state.linkFrom=null;renderAll()});
bindHelpTooltips();bindSplit();setWorkflow(defaultWorkflow());loadSession();loadWorkflows();loadReflectionCatalog();loadServerCatalog();
